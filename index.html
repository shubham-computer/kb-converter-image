<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Image Compressor & Downloader
  </title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>

    body{
      background:#f5f5f5;
    }

    .main-title{
      font-size:40px;
      font-weight:bold;
      text-align:center;
      margin-bottom:30px;
    }

    .image-card{
      background:white;
      border-radius:12px;
      border:1px solid #ddd;
      padding:15px;
      text-align:center;
      height:100%;
      transition:0.3s;
    }

    .image-card:hover{
      transform:translateY(-5px);
      box-shadow:0px 5px 15px rgba(0,0,0,0.1);
    }

    .image-card img{
      width:140px;
      height:140px;
      object-fit:contain;
      border:1px solid #eee;
      margin-bottom:10px;
      background:white;
    }

    .image-name{
      font-size:16px;
      font-weight:bold;
      word-break:break-word;
    }

    .stats-box{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
      box-shadow:0px 2px 10px rgba(0,0,0,0.05);
    }

    .loading{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
      display:none;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:30px;
      z-index:999;
    }

  </style>

</head>

<body>

<!-- Loading -->
<div
  class="loading"
  id="loading"
>
  Compressing Images...
</div>

<div class="container py-4">

  <!-- Title -->
  <div class="main-title">
    Image Compressor & Downloader
  </div>



  <!-- Inputs -->
  <div class="row align-items-end">

    <!-- Folder -->
    <div class="col-md-4 mb-3">

      <label class="form-label fw-bold">
        Select Image Folder
      </label>

      <input
        type="file"
        id="folderInput"
        class="form-control"
        webkitdirectory
        multiple
        accept="image/*"
      >

    </div>



    <!-- Multiple Images -->
    <div class="col-md-4 mb-3">

      <label class="form-label fw-bold">
        Select Multiple Images
      </label>

      <input
        type="file"
        id="imageInput"
        class="form-control"
        multiple
        accept="image/*"
      >

    </div>



    <!-- Compression -->
    <div class="col-md-2 mb-3">

      <label class="form-label fw-bold">
        Compress Size
      </label>

<select
  id="sizeSelect"
  class="form-select"
>

  <option value="10">
    10 KB
  </option>

  <option value="20">
    20 KB
  </option>

  <option value="30">
    30 KB
  </option>

  <option value="40">
    40 KB
  </option>

  <option value="50">
    50 KB
  </option>

  <option value="60">
    60 KB
  </option>

  <option value="70">
    70 KB
  </option>

  <option value="80">
    80 KB
  </option>

  <option value="90">
    90 KB
  </option>

  <option
    value="100"
    selected
  >
    100 KB
  </option>

</select>

    </div>



    <!-- Show Button -->
    <div class="col-md-2 mb-3">

      <button
        class="btn btn-primary w-100"
        onclick="processFiles()"
      >
        Show Images
      </button>

    </div>

  </div>



  <!-- Download Button -->
  <div class="mb-4">

    <button
      id="downloadBtn"
      class="btn btn-success d-none"
      onclick="downloadAllImages()"
    >
      Download Compressed Images
    </button>

  </div>



  <!-- Stats -->
  <div
    class="stats-box d-none"
    id="statsBox"
  >

    <div class="row text-center">

      <div class="col-md-6">

        <h5>
          Total Images
        </h5>

        <h3 id="totalImages">
          0
        </h3>

      </div>

      <div class="col-md-6">

        <h5>
          Compression Size
        </h5>

        <h3 id="selectedSize">
          100 KB
        </h3>

      </div>

    </div>

  </div>



  <!-- Images -->
  <div
    class="row"
    id="imageContainer"
  ></div>

</div>



<script>

  let allImages = [];



  // SHOW IMAGES
  async function processFiles(){

    const folderInput =
      document.getElementById(
        "folderInput"
      );

    const imageInput =
      document.getElementById(
        "imageInput"
      );

    const container =
      document.getElementById(
        "imageContainer"
      );



    // RESET
    container.innerHTML = "";

    document
      .getElementById("statsBox")
      .classList.add("d-none");

    document
      .getElementById("downloadBtn")
      .classList.add("d-none");

    allImages = [];



    // GET FILES
    const folderFiles =
      Array.from(
        folderInput.files
      );

    const selectedImages =
      Array.from(
        imageInput.files
      );



    // MERGE BOTH
    const allSelectedFiles = [
      ...folderFiles,
      ...selectedImages
    ];



    // VALIDATION
    if(!allSelectedFiles.length){

      alert(
        "Please select folder or images"
      );

      return;
    }



    // FILTER IMAGES
    const imageFiles =
      allSelectedFiles.filter(
        file =>
          file.type &&
          file.type.startsWith(
            "image/"
          )
      );



    // NO IMAGE FOUND
    if(!imageFiles.length){

      alert(
        "No image found"
      );

      return;
    }



    // REMOVE DUPLICATES
    const uniqueImages =
      imageFiles.filter(
        (file, index, self) =>

          index === self.findIndex(
            f =>
              f.name === file.name &&
              f.size === file.size
          )
      );



    // SAVE
    allImages = uniqueImages;



    // SHOW IMAGES
    uniqueImages.forEach(file => {

      const imageUrl =
        URL.createObjectURL(file);

      const col =
        document.createElement("div");

      col.className =
        "col-xl-3 col-lg-4 col-md-6 mb-4";

      col.innerHTML = `
        <div class="image-card">

          <img
            src="${imageUrl}"
            alt="${file.name}"
          >

          <div class="image-name">
            ${file.name}
          </div>

        </div>
      `;

      container.appendChild(col);

    });



    // SHOW STATS
    document
      .getElementById("statsBox")
      .classList.remove("d-none");

    document
      .getElementById("totalImages")
      .innerText =
      uniqueImages.length;

    document
      .getElementById("selectedSize")
      .innerText =
      document.getElementById(
        "sizeSelect"
      ).value + " KB";



    // SHOW DOWNLOAD BUTTON
    document
      .getElementById("downloadBtn")
      .classList.remove("d-none");

  }






  // COMPRESS IMAGE
  function compressImage(
    file,
    targetKB
  ){

    return new Promise((resolve) => {

      const img =
        new Image();

      const reader =
        new FileReader();

      reader.readAsDataURL(file);

      reader.onload = e => {

        img.src =
          e.target.result;

      };



      img.onload = () => {

        const canvas =
          document.createElement(
            "canvas"
          );

        const ctx =
          canvas.getContext("2d");

        canvas.width =
          img.width;

        canvas.height =
          img.height;

        ctx.drawImage(
          img,
          0,
          0
        );



        let quality = 0.9;



        function attempt(){

          canvas.toBlob(
            (blob) => {

              const sizeKB =
                blob.size / 1024;



              if(
                sizeKB <= targetKB ||
                quality <= 0.1
              ){

                resolve(blob);

              }
              else{

                quality -= 0.05;

                attempt();

              }

            },
            "image/jpeg",
            quality
          );

        }



        attempt();

      };

    });

  }






  // DOWNLOAD ALL IMAGES
  async function downloadAllImages(){

    try{

      if(!allImages.length){

        alert(
          "No images found"
        );

        return;
      }



      // BROWSER SUPPORT
      if(
        !window.showDirectoryPicker
      ){

        alert(
          "Use Chrome or Edge Browser"
        );

        return;
      }



      // SHOW LOADING
      document
        .getElementById("loading")
        .style.display = "flex";



      const targetKB =
        parseInt(
          document.getElementById(
            "sizeSelect"
          ).value
        );



      // SELECT LOCATION
      const parentDirectory =
        await window
          .showDirectoryPicker();



      // FOLDER NAME
      const today =
        new Date();

      const folderName =
        "Compressed_" +
        today.getFullYear() + "-" +
        String(
          today.getMonth() + 1
        ).padStart(2,"0") + "-" +
        String(
          today.getDate()
        ).padStart(2,"0") + "_" +
        targetKB + "KB";



      // CREATE NEW FOLDER
      const newFolder =
        await parentDirectory
          .getDirectoryHandle(
            folderName,
            { create:true }
          );



      // SAVE ALL FILES
      for(let i = 0; i < allImages.length; i++){

        const file =
          allImages[i];



        const compressedBlob =
          await compressImage(
            file,
            targetKB
          );



        const originalName =
          file.name.split(".")[0];



        // UNIQUE FILE NAME
        const uniqueName =
          originalName +
          "_" +
          i +
          "_" +
          Date.now() +
          ".jpg";



        const fileHandle =
          await newFolder
            .getFileHandle(
              uniqueName,
              { create:true }
            );



        const writable =
          await fileHandle
            .createWritable();



        await writable.write(
          compressedBlob
        );



        await writable.close();

      }



      // HIDE LOADING
      document
        .getElementById("loading")
        .style.display = "none";



      alert(
        "All images downloaded successfully!"
      );

    }
    catch(error){

      console.log(error);



      document
        .getElementById("loading")
        .style.display = "none";



      alert(
        "Download cancelled or failed"
      );

    }

  }

</script>

</body>
</html>
